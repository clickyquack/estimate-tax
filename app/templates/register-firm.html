<!DOCTYPE html>
<html>
<head>
    <title>Register Firm</title>
</head>
<body>
    <h2>Register a New Firm</h2>

    <form method="POST" action="/register-firm">
        <label>Firm Name:</label>
        <input type="text" name="firm_name" required><br><br>

        <label>Firm Email:</label>
        <input type="email" name="firm_email" required><br><br>

        <label>Your Name (Admin):</label>
        <input type="text" name="owner_name" required><br><br>

        <label>Password:</label>
        <input type="password" name="owner_password" required><br><br>

        <button type="submit">Complete Registration</button>
    </form>
</body>
</html>
