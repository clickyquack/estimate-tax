{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block styles %}{% endblock %}

{% block content %}
<div class="container py-5 my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 card border-0 shadow-sm p-5 rounded-4">
            <h1 class="display-1 fw-bold">401</h1>
            <h2 class="fw-bold mb-4">Unauthorized</h2>
            <p class="text-muted mb-5">
                You are not authorized to access this page. Please log in to continue.
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg px-4 rounded-pill">Return Home</a>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-dark btn-lg px-4 rounded-pill">Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}{% endblock %}
