<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <button class="btn btn-outline-light d-md-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                Menu
            </button>
            
            <a class="navbar-brand fw-bold" href="#">estimate.tax</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid">
        <div class="row content-rows">
            
            <!-- Left Panel -->
            <aside class="col-md-3 col-lg-2 offcanvas-md offcanvas-start bg-white shadow-sm p-3" tabindex="-1" id="sidebarMenu">
                <div class="offcanvas-header d-md-none">
                    <h5 class="offcanvas-title">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
                </div>
                
                <div class="input-group mb-3">
                    <input type="text" id="clientSearch" class="form-control" placeholder="Search clients..." aria-label="Search">
                </div>

                <div class="list-group list-group-flush client-list" id="clientList">
                    {% for client in clients %}
                        <button type="button" class="list-group-item list-group-item-action" data-id="{{ client.id }}">
                            {{ client.name }}
                        </button>
                    {% else %}
                        <div class="p-3 text-muted">No clients added yet.</div>
                    {% endfor %}
                </div>

                <hr>

            </aside>

            <!-- Main Panel -->
            <main class="col-md-9 col-lg-10 p-4">                
                <div class="row g-4">

                        <div class="col-md-12">
                            <div class="card h-100 border-0 shadow-sm text-center p-4">
                                <div class="card-body">
                                    <h5 class="card-title text-muted">Pending Estimates</h5>
                                    <h2 class="fw-bold">7</h2>
                                </div>
                            </div>
                        </div>
                
                        <div class="col-md-6">
                            <div class="card h-100 border-0 shadow-sm text-center p-4">
                                <div class="card-body">
                                    <h5 class="card-title text-muted">Clients</h5>
                                    <h2 class="fw-bold">22</h2>
                                </div>
                            </div>
                        </div>
                
                        <div class="col-md-6">
                            <div class="card h-100 border-0 shadow-sm text-center p-4">
                                <div class="card-body">
                                    <h5 class="card-title text-muted">Quarterly Revenue</h5>
                                    <h2 class="fw-bold text-success">$12,450</h2>
                                </div>
                            </div>
                        </div>
                
                        <div class="col-md-4">
                            <div class="card h-100 border-0 shadow-sm text-center p-4">
                                <div class="card-body">
                                    <h5 class="card-title text-muted">Example</h5>
                                    <h2 class="fw-bold">Example</h2>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-8">
                            <div class="card h-100 border-0 shadow-sm text-center p-4">
                                <div class="card-body">
                                    <h5 class="card-title text-muted">Example</h5>
                                    <h2 class="fw-bold">Example</h2>
                                </div>
                            </div>
                        </div>
                        
                </div>
            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Client Search Filter Logic
        document.getElementById('clientSearch').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let items = document.querySelectorAll('#clientList .list-group-item');
            items.forEach(item => {
                let text = item.textContent.toLowerCase();
                item.style.display = text.includes(filter) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
